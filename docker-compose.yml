services:
  postgres:
    image: postgres:16-alpine
    container_name: courtcast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: courtcast
      POSTGRES_PASSWORD: courtcast
      POSTGRES_DB: courtcast
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtcast -d courtcast"]
      interval: 5s
      timeout: 5s
      retries: 5
