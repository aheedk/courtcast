[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# /api/* is proxied to the Railway backend so cookies stay same-origin.
# Order matters: this MUST come before the catch-all SPA fallback below,
# otherwise the fallback would shadow API requests with index.html.
[[redirects]]
  from = "/api/*"
  to = "https://courtcast-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback so client-side routes (/login, /my-courts) work on direct
# navigation and refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
