[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# /api/* is proxied to the Railway backend so cookies stay same-origin.
# Hardcoded here (rather than env-driven via gen-redirects.mjs) so this
# can't silently break when a Netlify env var is missing.
[[redirects]]
  from = "/api/*"
  to = "https://courtcast-production.up.railway.app/api/:splat"
  status = 200
  force = true

# The SPA fallback (/* → /index.html) is still emitted by
# scripts/gen-redirects.mjs into dist/_redirects.
